name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify bundled database exists
        run: |
          if [ ! -f "assets/bhuvalaya_oracle.db" ]; then
            echo "ERROR: assets/bhuvalaya_oracle.db not found."
            exit 1
          fi
          echo "Found bundled database:"
          ls -lh assets/bhuvalaya_oracle.db

      - name: Install Flet CLI
        run: pip install flet

      - name: Build APK
        run: flet build apk --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bhoovalaya-apk
          path: build/apk/*.apk
