name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade flet flet-cli

    # --no-isolation फ़्लैग Flet के आंतरिक कंपाइलर को नेटवर्क ब्लॉक किए बिना 
    # सीधे Android (ARM64) के संगत numpy और pandas डाउनलोड करने की अनुमति देता है।
    - name: Build Android APK
      run: |
        yes | flet build apk --no-isolation
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk
