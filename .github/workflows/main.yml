name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Build Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade flet flet-cli

    # PIP_ONLY_BINARY और अन्य वेरिएबल्स Flet के आंतरिक कंपाइलर को 
    # मजबूर करेंगे कि वह Linux x86_64 के बजाय सीधे Android संगत पैकेज डाउनलोड करे।
    - name: Build Android APK
      env:
        PIP_ONLY_BINARY: ":all:"
        PIP_PREFER_BINARY: "true"
        PIP_NO_BUILD_ISOLATION: "false"
      run: |
        yes | flet build apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk
