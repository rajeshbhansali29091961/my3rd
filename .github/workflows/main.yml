name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas requests
        pip install --upgrade flet flet-cli

    # PIP_NO_INDEX और PIP_FIND_LINKS पर्यावरण वेरिएबल्स Flet के आंतरिक Pip को 
    # बाहर इंटरनेट पर जाने से पूरी तरह रोक देंगे और इसे लोकल कैश से बिल्ड करेंगे।
    - name: Build Android APK
      env:
        PIP_NO_INDEX: "true"
        PIP_FIND_LINKS: /opt/hostedtoolcache/Python/3.11.15/x64/lib/python3.11/site-packages
        PIP_CONFIG_FILE: /dev/null
      run: |
        yes | flet build apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk
