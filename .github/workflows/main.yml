name: Build Flet Android APK

on:
  push:
    branches:
      - main  # या आपके मुख्य ब्रांच का नाम (जैसे master)
  workflow_dispatch: # इससे आप जब चाहें मैन्युअल रूप से भी रन कर सकते हैं

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकआउट करें
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. जावा सेटअप करें (Android SDK के लिए ज़रूरी है)
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Android SDK सेट करें
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. पायथन सेटअप करें
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 5. Flutter और Flet की ज़रूरतें इंस्टॉल करें
    - name: Install Dependencies
      run: |
        python -msandbox.utils || true  # कुछ एनवायरनमेंट फिक्स के लिए
        pip install --upgrade pip
        pip install flet pandas requests
        # अगर NseKit की जरूरत है तो: pip install NseKit (वैकल्पिक)

    # 6. Flet प्रोजेक्ट को APK में बिल्ड करें
    - name: Build Android APK
      run: |
        flet build apk --release

    # 7. तैयार हुई APK को GitHub पर अपलोड करें ताकि आप डाउनलोड कर सकें
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk

