name: Build Flet Android APK

on:
  push:
    branches:
      - main  # या आपके मुख्य ब्रांच का नाम
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. कोड चेकOUT करें
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. जावा सेटअप करें (Android SDK के लिए ज़रूरी है)
    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Android SDK सेट करें
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Flutter SDK पहले से इंस्टॉल करें ताकि Flet सवाल न पूछे
    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x' # Flet 0.26/0.85 के लिए उपयुक्त स्थिर वर्जन

    # 5. पायथन सेटअप करें
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 6. Flet और अन्य ज़रूरी लाइब्रेरी इंस्टॉल करें
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet pandas requests

    # 7. Flet प्रोजेक्ट को APK में बिना किसी प्रॉम्ट (yes |) के बिल्ड करें
    - name: Build Android APK
      run: |
        yes | flet build apk

    # 8. तैयार हुई APK को GitHub पर अपलोड करें
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk

