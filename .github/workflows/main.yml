name: Build Flet Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Flutter SDK
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.x'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install and Vendor Dependencies
      run: |
        python -m pip install --upgrade pip
        # 1. शुद्ध पायथन (no-binary) वाले pandas और requests डाउनलोड करें
        pip install --target=. pandas requests
        pip install --upgrade flet flet-cli
        
        # 2. किसी भी प्रकार के बाहरी संघर्ष से बचने के लिए कैश साफ करें
        rm -rf *.dist-info __pycache__

    - name: Build Android APK
      run: |
        yes | flet build apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Bhoovalaya-Engine-APK
        path: build/apk/*.apk

