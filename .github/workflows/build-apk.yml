name: Build Android APK
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: stable
          cache: true
      - name: Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android/cmdline-tools
          unzip -q commandlinetools-linux-11076708_latest.zip -d $HOME/android/cmdline-tools
          mv $HOME/android/cmdline-tools/cmdline-tools $HOME/android/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android" >> $GITHUB_ENV
          echo "$HOME/android/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android/platform-tools" >> $GITHUB_PATH
      - name: SDK Licenses
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;25.1.8937393"
      
      # ── FIX: Generate requirements.txt so Flet knows to package 'requests' ──
      - name: Create requirements file
        run: |
          echo "flet==0.28.3" > requirements.txt
          echo "requests" >> requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android
          export ANDROID_SDK_ROOT=$HOME/android
          flet build apk --verbose --no-rich-output
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: bhoovalaya-apk
          path: build/apk/*.apk
          retention-days: 30
